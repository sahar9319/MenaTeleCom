<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telecom Research Log</title>
    <style>
      :root {
        --bg: #eef4f0;
        --surface: #f6f8f2;
        --surface-soft: rgba(255, 255, 255, 0.48);
        --ink: #24302f;
        --muted: #66736f;
        --primary: #1e3a5f;
        --accent: #e07a5f;
        --secondary: #2a9d8f;
        --tertiary: #d9a441;
        --success: #5fa8a0;
        --clay-light: #f4f1ea;
        --clay-dark: #b7c9d3;
        --avatar-skin-color: #fddcb5;
        --avatar-headset-color: #3d5a80;
        --highlight-color: rgba(224, 122, 95, 0.26);
        --avatar-size: 90px;
        --radius: 24px;
        --radius-sm: 16px;
        --content: 1160px;
        --gutter: clamp(16px, 4vw, 42px);
        --card-height: clamp(290px, 32vw, 372px);
        --shadow: 14px 14px 30px rgba(112, 126, 142, 0.28), -14px -14px 30px rgba(255, 255, 255, 0.82), inset 3px 3px 9px rgba(255, 255, 255, 0.72), inset -3px -3px 9px rgba(128, 143, 158, 0.12);
        --shadow-soft: 9px 9px 20px rgba(112, 126, 142, 0.22), -9px -9px 20px rgba(255, 255, 255, 0.76), inset 2px 2px 7px rgba(255, 255, 255, 0.72), inset -2px -2px 7px rgba(128, 143, 158, 0.1);
        --shadow-pressed: inset 7px 7px 15px rgba(112, 126, 142, 0.24), inset -7px -7px 15px rgba(255, 255, 255, 0.78);
        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --quick-view-ms: 5000ms;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 12% 6%, color-mix(in srgb, var(--tertiary) 28%, transparent), transparent 23rem),
          radial-gradient(circle at 90% 0%, color-mix(in srgb, var(--primary) 22%, transparent), transparent 24rem),
          linear-gradient(135deg, var(--bg), #f8f0e7 52%, #e8f1ef);
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
        touch-action: manipulation;
      }

      body.modal-lock {
        overflow: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
        touch-action: manipulation;
      }

      button:focus-visible,
      input:focus-visible,
      a:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--primary) 36%, transparent);
        outline-offset: 4px;
      }

      .app-shell {
        min-height: 100vh;
        padding-top: 86px;
      }

      .topbar {
        position: fixed;
        top: 14px;
        left: 50%;
        z-index: 18;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        width: min(var(--content), calc(100% - 28px));
        padding: 10px 12px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--surface) 76%, transparent);
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(16px);
        transform: translateX(-50%);
      }

      .nav-actions {
        display: flex;
        align-items: center;
        flex: 0 0 auto;
        gap: 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 12px;
      }

      .logo-wrap,
      .flag-wrap {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        overflow: hidden;
        background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 42%, white), color-mix(in srgb, var(--secondary) 44%, white));
        box-shadow: var(--shadow-soft);
      }

      .logo-wrap {
        width: 50px;
        height: 50px;
        border-radius: 18px;
      }

      .flag-wrap {
        width: 42px;
        height: 30px;
        border-radius: 10px;
      }

      .logo-wrap img,
      .flag-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-title {
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        font-size: clamp(0.98rem, 2vw, 1.12rem);
        font-weight: 850;
        line-height: 1.05;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand-tagline {
        margin: 3px 0 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .page {
        width: min(var(--content), calc(100% - (var(--gutter) * 2)));
        margin: 0 auto;
        padding-bottom: clamp(44px, 8vw, 86px);
      }

      .hero {
        display: grid;
        gap: clamp(22px, 4vw, 34px);
        padding: clamp(22px, 5vw, 46px) 0 clamp(28px, 6vw, 54px);
      }

      .hero-copy {
        max-width: 780px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2.35rem, 7vw, 5.25rem);
        line-height: 0.98;
      }

      .hero p {
        max-width: 650px;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.16rem);
        line-height: 1.65;
      }

      .icon-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(12px, 2vw, 20px);
      }

      .clay-icon {
        position: relative;
        display: grid;
        place-items: center;
        min-height: clamp(92px, 13vw, 138px);
        border-radius: var(--radius);
        background: linear-gradient(135deg, color-mix(in srgb, var(--tone) 34%, var(--surface)), color-mix(in srgb, var(--tone) 16%, white));
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .clay-icon::before {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: calc(var(--radius) - 8px);
        box-shadow: inset 5px 5px 13px rgba(255,255,255,0.56), inset -5px -5px 13px color-mix(in srgb, var(--tone) 24%, transparent);
      }

      .clay-icon svg {
        position: relative;
        width: 44px;
        height: 44px;
        color: color-mix(in srgb, var(--tone) 84%, #24302f);
        stroke-width: 2.25;
      }

      .status {
        display: none;
        margin-bottom: 24px;
        padding: 16px 18px;
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow-soft);
        color: var(--muted);
      }

      .status.visible {
        display: block;
      }

      .grid,
      .skeleton-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: clamp(18px, 3vw, 28px);
      }

      @media (min-width: 768px) {
        .grid,
        .skeleton-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1024px) {
        .grid,
        .skeleton-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      .hidden {
        display: none !important;
      }

      .skeleton-grid {
        opacity: 1;
        transition: opacity 280ms var(--ease);
      }

      .skeleton-grid.fading {
        opacity: 0.86;
      }

      .skeleton-card {
        min-height: var(--card-height);
        border-radius: var(--radius);
        background: linear-gradient(110deg, color-mix(in srgb, var(--surface) 80%, transparent), rgba(255,255,255,0.78), color-mix(in srgb, var(--surface) 80%, transparent));
        background-size: 200% 100%;
        box-shadow: var(--shadow);
        animation: pulse 1.35s var(--ease) infinite;
      }

      @keyframes pulse {
        0% { opacity: 0.62; background-position: 170% 0; }
        50% { opacity: 1; }
        100% { opacity: 0.62; background-position: -20% 0; }
      }

      .episode-card {
        position: relative;
        min-height: var(--card-height);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
        opacity: 0;
        transform: translate3d(0, 12px, 0);
        transition: opacity 320ms var(--ease), transform 320ms var(--ease), box-shadow 220ms var(--ease);
      }

      .episode-card.ready {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .episode-card:hover,
      .episode-card:focus-within {
        box-shadow: 18px 18px 38px rgba(112, 126, 142, 0.34), -16px -16px 34px rgba(255,255,255,0.86), inset 3px 3px 9px rgba(255,255,255,0.78), inset -3px -3px 9px rgba(128,143,158,0.12);
      }

      .image-button {
        display: block;
        width: 100%;
        min-height: var(--card-height);
        padding: 0;
        background: transparent;
        text-align: left;
      }

      .cover {
        position: absolute;
        inset: 12px;
        overflow: hidden;
        border-radius: calc(var(--radius) - 8px);
        background: color-mix(in srgb, var(--primary) 14%, var(--surface));
      }

      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 34%, rgba(20, 34, 34, 0.66));
        pointer-events: none;
      }

      .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translateZ(0) scale(1.01);
        transition: transform 420ms var(--ease), opacity 220ms var(--ease);
      }

      .episode-card:hover .cover img {
        transform: translateZ(0) scale(1.04);
      }

      .cover.has-error img {
        opacity: 0;
      }

      .image-fallback {
        position: relative;
        z-index: 2;
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        padding: 22px;
        color: var(--muted);
        text-align: center;
      }

      .title-overlay {
        position: absolute;
        z-index: 2;
        left: 22px;
        right: 78px;
        bottom: 22px;
        color: #fff;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.36);
      }

      .title-overlay h2 {
        margin: 0;
        font-size: clamp(1.08rem, 1.8vw, 1.36rem);
        font-weight: 820;
        line-height: 1.18;
      }

      .title-overlay time {
        display: block;
        margin-top: 6px;
        font-size: 0.82rem;
        opacity: 0.82;
      }

      .clay-button,
      .quick-view,
      .round-btn {
        display: inline-grid;
        place-items: center;
        width: 46px;
        height: 46px;
        border-radius: 16px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        box-shadow: var(--shadow-soft);
        transition: transform 180ms var(--ease), box-shadow 180ms var(--ease);
      }

      .clay-button:active,
      .quick-view:active,
      .round-btn:active {
        transform: translate3d(0, 1px, 0) scale(0.98);
        box-shadow: var(--shadow-pressed);
      }

      .clay-button svg,
      .quick-view svg,
      .round-btn svg {
        width: 24px;
        height: 24px;
        stroke-width: 2.25;
      }

      .home-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: auto;
        min-width: max-content;
        padding: 0 18px;
        font-size: 0.9rem;
        font-weight: 820;
        white-space: nowrap;
      }

      .view-panel {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        transition: opacity 260ms var(--ease), transform 260ms var(--ease);
      }

      .view-panel.is-exiting {
        opacity: 0;
        transform: translate3d(0, 10px, 0);
      }

      .home-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      .quick-view {
        position: absolute;
        top: 22px;
        right: 22px;
        z-index: 4;
        background: linear-gradient(135deg, var(--accent), var(--tertiary));
      }

      .flip-layer {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        perspective: 1800px;
        background: rgba(26, 36, 36, 0);
        transition: background 360ms var(--ease);
      }

      .flip-layer.active {
        display: block;
      }

      .flip-layer.shaded {
        background: rgba(26, 36, 36, 0.56);
      }

      .flip-shell {
        position: fixed;
        transform-origin: top left;
        transform-style: preserve-3d;
        transition: transform 380ms var(--ease);
        will-change: transform;
      }

      .flip-card {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transition: transform 560ms var(--ease);
      }

      .flip-card.flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        overflow: hidden;
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: 24px 24px 54px rgba(23, 34, 34, 0.32), -18px -18px 42px rgba(255,255,255,0.42);
        backface-visibility: hidden;
      }

      .flip-layer.shaded .face {
        border-radius: 0;
      }

      .front-face img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .back-face {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        max-height: 100vh;
        padding: clamp(12px, 2.6vw, 28px);
        gap: clamp(12px, 2vw, 18px);
        background:
          radial-gradient(circle at 10% 6%, color-mix(in srgb, var(--tertiary) 18%, transparent), transparent 18rem),
          radial-gradient(circle at 92% 8%, color-mix(in srgb, var(--primary) 16%, transparent), transparent 18rem),
          linear-gradient(135deg, var(--bg), #f8f0e7);
        transform: rotateY(180deg);
      }

      .reader-header {
        display: flex;
        align-items: center;
        gap: 12px;
        width: min(980px, 100%);
        min-width: 0;
        margin: 0 auto;
      }

      .reader-title {
        min-width: 0;
        margin-right: auto;
      }

      .reader-title h2 {
        margin: 0;
        overflow: hidden;
        font-size: clamp(1.15rem, 2vw, 1.65rem);
        line-height: 1.14;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reader-title time {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      .reader-home {
        background: linear-gradient(135deg, var(--success), var(--primary));
      }

      .reader-back {
        width: auto;
        min-width: max-content;
        padding: 0 18px;
        gap: 8px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        font-weight: 820;
      }

      .markdown-body {
        overflow-y: auto;
        min-height: 0;
        width: min(980px, 100%);
        max-height: 100%;
        margin: 0 auto;
        padding: clamp(16px, 3vw, 30px);
        border-radius: clamp(18px, 2vw, 26px);
        background: color-mix(in srgb, var(--surface) 72%, transparent);
        box-shadow: var(--shadow);
        color: var(--ink);
        font-size: clamp(1rem, 1.3vw, 1.125rem);
        line-height: 1.72;
        scrollbar-color: color-mix(in srgb, var(--primary) 48%, transparent) transparent;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        margin: 0 0 12px;
        line-height: 1.16;
      }

      .markdown-body h1 {
        font-size: clamp(1.45rem, 2.4vw, 2rem);
      }

      .markdown-body h2 {
        font-size: clamp(1.25rem, 2vw, 1.55rem);
      }

      .markdown-body h3 {
        font-size: clamp(1.1rem, 1.7vw, 1.28rem);
      }

      .markdown-body p,
      .markdown-body ul {
        max-width: 74ch;
        margin: 0 0 16px;
      }

      .markdown-body a {
        color: color-mix(in srgb, var(--primary) 72%, #1d4f4a);
        font-weight: 760;
      }

      .sentence {
        display: inline-block;
        border-radius: 12px;
        padding: 0 0.16em;
        transition: background-color 160ms var(--ease), color 160ms var(--ease), transform 160ms var(--ease), box-shadow 160ms var(--ease);
        transform-origin: center;
      }

      .sentence.active {
        color: var(--ink);
        background: var(--highlight-color);
        box-shadow: inset 2px 2px 5px rgba(255,255,255,0.62), inset -2px -2px 5px color-mix(in srgb, var(--accent) 18%, transparent);
        transform: scale(1.015);
      }

      .player {
        display: grid;
        grid-template-columns: auto auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 12px 14px;
        border-radius: 24px;
        background: linear-gradient(135deg, color-mix(in srgb, var(--secondary) 18%, var(--surface)), color-mix(in srgb, var(--primary) 12%, var(--surface)));
        box-shadow: var(--shadow);
      }

      .floating-avatar {
        position: fixed;
        right: max(24px, env(safe-area-inset-right));
        bottom: max(24px, env(safe-area-inset-bottom));
        z-index: 70;
        width: var(--avatar-size);
        height: var(--avatar-size);
        border: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
        opacity: 0;
        pointer-events: none;
        transform: translate3d(0, var(--avatar-y, 0), 0) rotate(var(--avatar-rotate, 0deg)) scale(var(--avatar-scale, 1));
        transform-origin: center bottom;
        transition: opacity 220ms var(--ease), transform 220ms var(--ease);
        will-change: transform;
      }

      .floating-avatar.speaking {
        opacity: 0.98;
      }

      body.modal-lock .floating-avatar {
        opacity: 0.72;
      }

      body.modal-lock .floating-avatar.speaking {
        opacity: 0.9;
      }

      .avatar-head-svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .avatar-photo {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 0;
        border-radius: 42% 42% 48% 48%;
        background: transparent;
        box-shadow: none;
        -webkit-mask-image: radial-gradient(ellipse 48% 62% at 50% 43%, #000 78%, transparent 94%);
        mask-image: radial-gradient(ellipse 48% 62% at 50% 43%, #000 78%, transparent 94%);
      }

      .avatar-photo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 50% 24%;
        transform: scale(2.24);
        transform-origin: 50% 24%;
      }

      .avatar-photo-mouth {
        position: absolute;
        left: 50.5%;
        top: 64.5%;
        width: 19%;
        height: 3.8%;
        border-radius: 999px;
        background: color-mix(in srgb, var(--ink) 86%, black);
        opacity: 0.84;
        transform: translate(-50%, -50%) scale(var(--mouth-x, 1), var(--mouth-y, 1));
        transform-origin: center;
        transition: transform 90ms linear, opacity 140ms var(--ease);
      }

      .avatar-eye,
      .avatar-brow,
      .avatar-mouth {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 90ms linear;
      }

      .avatar-mouth {
        transform: scale(var(--mouth-x, 1), var(--mouth-y, 1));
      }

      #muteBtn {
        background: linear-gradient(135deg, var(--secondary), var(--primary));
      }

      .ranges {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .volume-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 760;
      }

      input[type="range"] {
        width: 100%;
        min-height: 26px;
        accent-color: var(--primary);
        cursor: pointer;
      }

      .time {
        color: var(--muted);
        font-size: 0.84rem;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        place-items: center;
        padding: 24px;
        background: color-mix(in srgb, var(--ink) 70%, transparent);
        opacity: 0;
        transition: opacity 240ms var(--ease);
      }

      .lightbox.active {
        display: grid;
      }

      .lightbox.visible {
        opacity: 1;
      }

      .lightbox:focus {
        outline: none;
      }

      .lightbox-panel {
        position: relative;
        width: min(920px, 94vw);
        max-height: 86vh;
        padding: 12px;
        border-radius: calc(var(--radius) + 6px);
        background: color-mix(in srgb, var(--surface) 76%, transparent);
        box-shadow: 24px 24px 54px rgba(0,0,0,0.28), -14px -14px 34px rgba(255,255,255,0.14), inset 3px 3px 9px rgba(255,255,255,0.56);
        opacity: 0;
        transform: translate3d(0, 14px, 0) scale(0.96);
        transition: opacity 260ms var(--ease), transform 260ms var(--ease);
      }

      .lightbox.visible .lightbox-panel {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }

      .lightbox img {
        display: block;
        width: 100%;
        max-height: 82vh;
        object-fit: contain;
        border-radius: var(--radius);
      }

      .countdown {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: -14px;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255,255,255,0.28);
      }

      .countdown::before {
        content: "";
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--secondary), var(--tertiary));
        transform-origin: left center;
      }

      .lightbox.visible .countdown::before {
        animation: drain var(--quick-view-ms) linear forwards;
      }

      @keyframes drain {
        to { transform: scaleX(0); }
      }

      const applyTheme = () => {

      const applyCopy = () => {

      const applyAssets = () => {

          img.alt = "";

      };

      const setStatus = (message) => {
        statusBox.textContent = message;
        statusBox.classList.toggle("visible", Boolean(message));
      };

      const setBackgroundInert = (inert) => {
        appShell.inert = inert;
      };

      const switchView = async (view) => {
        if (currentView === view) return;
        const views = {
          home: homeView,
          episodes: episodesView
        };
        const leaving = views[currentView];
        const entering = views[view];
        if (!leaving || !entering) return;

        leaving.classList.add("is-exiting");
        await wait(motionDuration("fade"));
        leaving.classList.add("hidden");
        leaving.classList.remove("is-exiting");
        entering.classList.remove("hidden");
        requestAnimationFrame(() => entering.classList.remove("is-exiting"));
        currentView = view;
      };

      const goHome = async () => {
        if (lightbox.classList.contains("active")) {
          await closeQuickView(false);
        }
        if (isExpanded) {
          await closeEpisode(false);
        }
        await switchView("home");
        setBackgroundInert(false);
        document.querySelector("#top").scrollIntoView({ behavior: reduceMotion.matches ? "auto" : "smooth", block: "start" });
        homeBtn.focus({ preventScroll: true });
      };

      const escapeHtml = (text) => String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

      const sanitizeUrl = (url) => {
        const trimmed = url.trim();
        try {
          const parsed = new URL(trimmed, window.location.href);
          if (["http:", "https:", "mailto:"].includes(parsed.protocol)) {
            return escapeHtml(trimmed);
          }
          if (trimmed.startsWith("./") || trimmed.startsWith("../") || trimmed.startsWith("/")) {
            return escapeHtml(trimmed);
          }
        } catch (error) {
          return "#";
        }
        return "#";
      };

      const inlineMarkdown = (text) => {
        let html = escapeHtml(text);
        html = html.replace(/\[([^\]]+)]\(([^)\s]+)\)/g, (match, label, href) => {
          const safeHref = sanitizeUrl(href);
          const isExternal = /^https?:|^mailto:/i.test(href.trim());
          return `<a href="${safeHref}"${isExternal ? ' target="_blank" rel="noopener noreferrer"' : ""}>${label}</a>`;
        });
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
        return html;
      };

      function parseMarkdown(md) {
        const blocks = md.replace(/\r\n/g, "\n").split(/\n{2,}/);
        const html = [];

        blocks.forEach((block) => {
          const trimmed = block.trim();
          if (!trimmed) return;

          const lines = trimmed.split("\n");
          if (lines.every((line) => /^-\s+/.test(line.trim()))) {
            html.push(`<ul>${lines.map((line) => `<li>${inlineMarkdown(line.trim().replace(/^-\s+/, ""))}</li>`).join("")}</ul>`);
            return;
          }

          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            return;
          }

          html.push(`<p>${inlineMarkdown(lines.join("<br>"))}</p>`);
        });

        return html.join("");
      }

      const formatTime = (seconds) => {
        if (!Number.isFinite(seconds)) return "0:00";
        const minutes = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
        return `${minutes}:${secs}`;
      };

      const telecomIcon = (name = "signal") => {
        const icons = {
          antenna: '<path d="M12 21V10"/><path d="M8 21h8"/><path d="M12 10 8 4M12 10l4-6"/><path d="M5 8c-2 3-2 6 0 9M19 8c2 3 2 6 0 9"/>',
          signal: '<path d="M4 17c5-5 11-5 16 0"/><path d="M7 13c3-3 7-3 10 0"/><path d="M10 9c1.4-1.2 2.6-1.2 4 0"/><path d="M12 20v1"/>',
          tower: '<path d="M12 21V8"/><path d="M8 21h8"/><path d="M9 13h6M8 17h8"/><path d="M12 8 8 4M12 8l4-4"/><path d="M5 7c-2 3-2 6 0 9M19 7c2 3 2 6 0 9"/>',
          satellite: '<path d="M7 15c3-5 7-8 12-10"/><path d="M8 16l5 5"/><path d="M4 20c2-2 4-2 6 0"/><path d="M15 5c2 2 3 4 3 7"/><path d="M18 3c2 1 3 3 3 5"/>',
          handset: '<path d="M7 5c5 8 4 9 12 12l-3 4c-7-2-11-6-13-13l4-3z"/><path d="M15 5c3 1 5 3 6 6"/><path d="M16 9c1 .5 2 1.5 2.5 2.5"/>',
          radio: '<path d="M6 11h12v9H6z"/><path d="M9 16h3"/><circle cx="16" cy="16" r="1.6"/><path d="M8 11 17 4"/><path d="M5 8c-2 3-2 6 0 9M20 8c2 3 2 6 0 9"/>'
        };
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">${icons[name] || icons.signal}</svg>`;
      };

      const plainMarkdown = (text) => String(text || "")
        .replace(/\[([^\]]+)]\(([^)]+)\)/g, "$1")
        .replace(/[#*_`>-]/g, "")
        .replace(/\s+/g, " ")
        .trim();

      const episodeFolder = (episode) => {
        const source = episode.text || episode.audio || "";
        const slash = source.lastIndexOf("/");
        return slash >= 0 ? source.slice(0, slash + 1) : "";
      };

      const fetchEpisodeTiming = async (episode) => {
        const timingUrl = episode.timing || `${episodeFolder(episode)}timing.json`;
        if (!timingUrl) return [];
        if (timingCache.has(timingUrl)) return timingCache.get(timingUrl);

        try {
          const response = await fetch(timingUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const timing = (await response.json()).filter((item) =>
            item && typeof item.word === "string" && Number.isFinite(Number(item.start)) && Number.isFinite(Number(item.end))
          );
          timingCache.set(timingUrl, timing);
          return timing;
        } catch (error) {
          timingCache.set(timingUrl, []);
          return [];
        }
      };

      const sentenceChunks = (text) => {
        const chunks = [];
        const matches = String(text).match(/[^.!?]+[.!?]+["')\]]*|[^.!?]+$/g);
        if (!matches) return chunks;
        matches.forEach((chunk) => {
          const leading = chunk.match(/^\s*/)[0];
          const trailing = chunk.match(/\s*$/)[0];
          const body = chunk.slice(leading.length, chunk.length - trailing.length);
          if (leading) chunks.push({ text: leading, sentence: false });
          if (body) chunks.push({ text: body, sentence: true, words: body.match(/\S+/g)?.length || 0 });
          if (trailing) chunks.push({ text: trailing, sentence: false });
        });
        return chunks;
      };

      const wrapTextNodeWithSentenceTiming = (textNode, timing, cursor) => {
        const text = textNode.nodeValue;
        const chunks = sentenceChunks(text);
        if (!chunks.length) return cursor;

        const fragment = document.createDocumentFragment();
        chunks.forEach((chunk) => {
          if (!chunk.sentence || !chunk.words || cursor.index >= timing.length) {
            fragment.append(document.createTextNode(chunk.text));
            return;
          }

          const first = timing[cursor.index];
          const last = timing[Math.min(timing.length - 1, cursor.index + chunk.words - 1)];
          const span = document.createElement("span");
          span.className = "sentence";
          span.dataset.start = String(Number(first.start));
          span.dataset.end = String(Number(last.end));
          span.textContent = chunk.text;
          fragment.append(span);
          cursor.index += chunk.words;
        });

        textNode.replaceWith(fragment);
        return cursor;
      };

      const enableTextHighlighting = (timing) => {
        activeWord = null;
        if (!timing.length) {
          markdownBody.dataset.highlighting = "false";
          return;
        }

        const cursor = { index: 0 };
        const walker = document.createTreeWalker(markdownBody, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            if (!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            const parent = node.parentElement;
            if (!parent || parent.closest("script, style, a")) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach((node) => wrapTextNodeWithSentenceTiming(node, timing, cursor));
        markdownBody.dataset.highlighting = cursor.index ? "true" : "false";
      };

      const collectReadableTextNodes = () => {
        const walker = document.createTreeWalker(markdownBody, NodeFilter.SHOW_TEXT, {
          acceptNode(node) {
            if (!node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            const parent = node.parentElement;
            if (!parent || parent.closest("script, style, a, .sentence")) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        return nodes;
      };

      const enableEstimatedHighlighting = () => {
        if (!Number.isFinite(audio.duration) || audio.duration <= 0 || markdownBody.dataset.highlighting === "true") {
          pendingEstimatedHighlight = !Number.isFinite(audio.duration) || audio.duration <= 0;
          return;
        }

        const nodes = collectReadableTextNodes();
        const totalWords = nodes.reduce((sum, node) => sum + (node.nodeValue.match(/\S+/g)?.length || 0), 0);
        if (!totalWords) {
          markdownBody.dataset.highlighting = "false";
          return;
        }

        const step = audio.duration / totalWords;
        const timing = Array.from({ length: totalWords }, (_, index) => ({
          word: "",
          start: index * step,
          end: Math.min(audio.duration, (index + 1) * step)
        }));
        enableTextHighlighting(timing);
        pendingEstimatedHighlight = false;
      };

      const updateTextHighlight = () => {
        highlightFrame = null;
        if (!isExpanded || markdownBody.dataset.highlighting !== "true") return;
        const current = audio.currentTime || 0;
        const active = Array.from(markdownBody.querySelectorAll(".sentence")).find((span) => {
          const start = Number(span.dataset.start);
          const end = Number(span.dataset.end);
          return current >= start && current < end;
        });
        if (active === activeWord) return;
        if (activeWord) activeWord.classList.remove("active");
        activeWord = active || null;
        if (activeWord) {
          activeWord.classList.add("active");
          if (!reduceMotion.matches) {
            activeWord.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
          }
        }
      };

      const requestTextHighlight = () => {
        if (highlightFrame !== null) return;
        highlightFrame = requestAnimationFrame(updateTextHighlight);
      };

      const builtInAvatar = () => `
        <svg class="avatar-head-svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
          <defs>
            <radialGradient id="avatarFaceGlow" cx="34%" cy="24%" r="74%">
              <stop offset="0" stop-color="#fff6e9"/>
              <stop offset="0.44" stop-color="var(--avatar-skin-color)"/>
              <stop offset="1" stop-color="color-mix(in srgb, var(--avatar-skin-color) 74%, var(--accent))"/>
            </radialGradient>
            <linearGradient id="avatarHeadset" x1="25" y1="18" x2="92" y2="92">
              <stop stop-color="color-mix(in srgb, var(--avatar-headset-color) 76%, white)"/>
              <stop offset="1" stop-color="var(--avatar-headset-color)"/>
            </linearGradient>
          </defs>
          <ellipse cx="32" cy="60" rx="9" ry="14" fill="color-mix(in srgb, var(--avatar-skin-color) 86%, var(--accent))"/>
          <ellipse cx="88" cy="60" rx="9" ry="14" fill="color-mix(in srgb, var(--avatar-skin-color) 86%, var(--accent))"/>
          <ellipse cx="60" cy="62" rx="38" ry="42" fill="url(#avatarFaceGlow)"/>
          <ellipse class="avatar-eye avatar-eye-left" cx="47" cy="56" rx="8" ry="6" fill="#fffaf2"/>
          <ellipse class="avatar-eye avatar-eye-right" cx="73" cy="56" rx="8" ry="6" fill="#fffaf2"/>
          <circle class="avatar-pupil" cx="48" cy="57" r="3.2" fill="var(--ink)"/>
          <circle class="avatar-pupil" cx="72" cy="57" r="3.2" fill="var(--ink)"/>
          <path class="avatar-brow avatar-brow-left" d="M39 45c5-4 10-4 15-1" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
          <path class="avatar-brow avatar-brow-right" d="M66 44c5-3 10-3 15 1" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
          <rect class="avatar-mouth" x="50" y="72" width="20" height="8" rx="4" fill="color-mix(in srgb, var(--ink) 86%, black)"/>
          <path d="M30 58c0-24 15-38 30-38s30 14 30 38" stroke="url(#avatarHeadset)" stroke-width="7" stroke-linecap="round"/>
          <rect x="22" y="54" width="13" height="22" rx="7" fill="url(#avatarHeadset)"/>
          <rect x="85" y="54" width="13" height="22" rx="7" fill="url(#avatarHeadset)"/>
          <path d="M91 74c0 13-11 20-24 20" stroke="url(#avatarHeadset)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="65" cy="94" r="4" fill="var(--avatar-headset-color)"/>
          <path d="M60 20V9M54 20h12M60 9l-5-5M60 9l5-5" stroke="var(--secondary)" stroke-width="3" stroke-linecap="round"/>
        </svg>
      `;

      const renderAvatar = () => {
        if (!config.enableAvatar) {
          avatarHost.classList.add("hidden");
          return;
        }
        avatarHost.classList.remove("hidden");
        if (!config.avatarImageUrl) {
          avatarHost.innerHTML = builtInAvatar();
          return;
        }

        avatarHost.innerHTML = `
          <div class="avatar-photo">
            <img src="${escapeHtml(config.avatarImageUrl)}" alt="">
            <span class="avatar-photo-mouth"></span>
          </div>
        `;
        const img = avatarHost.querySelector("img");
        img.onerror = () => {
          avatarHost.innerHTML = builtInAvatar();
        };
      };

      const setAvatarExpression = (speaking) => {
        const mouth = avatarHost.querySelector(".avatar-mouth, .avatar-photo-mouth");
        const brows = avatarHost.querySelectorAll(".avatar-brow");
        if (mouth) {
          const isPhoto = mouth.classList.contains("avatar-photo-mouth");
          const baseY = isPhoto ? 0.22 : 1;
          const gainY = isPhoto ? 5.2 : 2.2;
          mouth.style.setProperty("--mouth-x", String(1 + mouthWidth * 1.55));
          mouth.style.setProperty("--mouth-y", String(baseY + mouthLevel * gainY));
        }
        brows.forEach((brow, index) => {
          const sideLift = nodLevel > 0.35 && index === 0 ? 1.4 : 0;
          brow.style.transform = `translateY(${-browLevel * 2 - sideLift}px)`;
        });
        avatarHost.classList.toggle("speaking", speaking);
      };

      const blinkAvatar = () => {
        const eyes = avatarHost.querySelectorAll(".avatar-eye, .avatar-pupil");
        eyes.forEach((eye) => {
          eye.style.transform = "scaleY(0.1)";
        });
        setTimeout(() => {
          eyes.forEach((eye) => {
            eye.style.transform = "";
          });
        }, 110);
        scheduleBlink();
      };

      const scheduleBlink = () => {
        clearTimeout(blinkTimer);
        const speaking = activeAudio && !activeAudio.paused && !activeAudio.muted;
        const min = speaking ? 1500 : 2000;
        const max = speaking ? 4000 : 5000;
        blinkTimer = setTimeout(blinkAvatar, min + Math.random() * (max - min));
      };

      const stopAvatar = (audioElement = activeAudio) => {
        if (audioElement && activeAudio && audioElement !== activeAudio) return;
        activeAudio = null;
        mouthLevel = 0;
        mouthWidth = 0;
        browLevel = 0;
        nodLevel = 0;
        lastRms = 0;
        avatarHost.style.setProperty("--avatar-y", "0px");
        avatarHost.style.setProperty("--avatar-rotate", "0deg");
        setAvatarExpression(false);
        if (avatarFrame === null) {
          animateAvatar();
        }
        scheduleBlink();
      };

      const ensureAvatarAnalyser = async (audioElement) => {
        if (!audioContext) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return false;
          audioContext = new AudioContextClass();
        }
        if (audioContext.state === "suspended") {
          await audioContext.resume();
        }
        if (!avatarAnalyser) {
          avatarAnalyser = audioContext.createAnalyser();
          avatarAnalyser.fftSize = 256;
          avatarAnalyser.smoothingTimeConstant = 0.72;
          avatarData = new Uint8Array(avatarAnalyser.fftSize);
          avatarFreqData = new Uint8Array(avatarAnalyser.frequencyBinCount);
          avatarAnalyser.connect(audioContext.destination);
        }
        let source = audioSources.get(audioElement);
        if (!source) {
          source = audioContext.createMediaElementSource(audioElement);
          audioSources.set(audioElement, source);
        }
        if (connectedAvatarSource && connectedAvatarSource !== source) {
          try {
            connectedAvatarSource.disconnect();
          } catch (error) {
            /* Source may already be disconnected by the browser. */
          }
        }
        if (connectedAvatarSource !== source) {
          source.connect(avatarAnalyser);
          connectedAvatarSource = source;
        }
        return true;
      };

      const animateAvatar = () => {
        const sourceAudio = activeAudio;
        const now = performance.now();
        const idleY = Math.sin(now / 820) * 1.15;
        const idleRotate = Math.sin(now / 1100) * 1.5;

        if (!sourceAudio || sourceAudio.paused || sourceAudio.ended || sourceAudio.muted || !avatarAnalyser || !avatarData || !avatarFreqData) {
          avatarHost.style.setProperty("--avatar-y", `${idleY.toFixed(2)}px`);
          avatarHost.style.setProperty("--avatar-rotate", `${idleRotate.toFixed(2)}deg`);
          setAvatarExpression(false);
          avatarFrame = requestAnimationFrame(animateAvatar);
          return;
        }

        avatarAnalyser.getByteTimeDomainData(avatarData);
        avatarAnalyser.getByteFrequencyData(avatarFreqData);
        let sum = 0;
        for (let index = 0; index < avatarData.length; index += 1) {
          const normalized = (avatarData[index] - 128) / 128;
          sum += normalized * normalized;
        }
        let high = 0;
        const highStart = Math.floor(avatarFreqData.length * 0.55);
        for (let index = highStart; index < avatarFreqData.length; index += 1) {
          high += avatarFreqData[index] / 255;
        }
        const rms = Math.sqrt(sum / avatarData.length);
        const volume = Math.max(0, Math.min(1, (rms - 0.012) * 16));
        const highEnergy = high / Math.max(1, avatarFreqData.length - highStart);
        const peak = volume - lastRms > 0.18;
        lastRms = volume;
        mouthLevel += (volume - mouthLevel) * 0.38;
        mouthWidth += (Math.min(0.44, highEnergy * 0.62) - mouthWidth) * 0.28;
        browLevel += (volume - browLevel) * 0.18;
        nodLevel += ((peak ? 1 : 0) - nodLevel) * 0.32;
        const speakingY = idleY + (nodLevel * 1.4);
        const speakingRotate = idleRotate + (peak ? -1.1 : 0);
        avatarHost.style.setProperty("--avatar-y", `${speakingY.toFixed(2)}px`);
        avatarHost.style.setProperty("--avatar-rotate", `${speakingRotate.toFixed(2)}deg`);
        setAvatarExpression(true);
        avatarFrame = requestAnimationFrame(animateAvatar);
      };

      const startAvatar = async (audioElement = audio) => {
        if (!audioElement || audioElement.muted) {
          stopAvatar();
          return;
        }
        if (activeAudio && activeAudio !== audioElement && !activeAudio.paused) {
          activeAudio.pause();
        }
        activeAudio = audioElement;
        const ready = await ensureAvatarAnalyser(audioElement);
        if (!ready) return;
        if (avatarFrame !== null) cancelAnimationFrame(avatarFrame);
        scheduleBlink();
        animateAvatar();
      };

      const updateTime = () => {
        const duration = audio.duration || 0;
        const current = audio.currentTime || 0;
        progress.value = duration ? String((current / duration) * 100) : "0";
        timeDisplay.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
      };

      const setPlayState = () => {
        const playing = !audio.paused;
        playBtn.setAttribute("aria-label", playing ? config.audioPauseLabel : config.audioPlayLabel);
        playIcon.innerHTML = playing
          ? '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>'
          : '<path d="M8 5v14l11-7z"/>';
      };

      const setMuteState = () => {
        const muted = audio.muted;
        muteBtn.setAttribute("aria-label", muted ? config.unmuteTitle : config.muteTitle);
        muteBtn.title = muted ? config.unmuteTitle : config.muteTitle;
        muteIcon.innerHTML = muted
          ? '<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="m18 9-5 5"/><path d="m13 9 5 5"/>'
          : '<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9.5c1.3 1.4 1.3 3.6 0 5"/>';
      };

      const fetchMarkdownHtml = async (episode) => {
        if (markdownCache.has(episode.id)) {
          return markdownCache.get(episode.id);
        }

        try {
          const response = await fetch(episode.text);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          const html = parseMarkdown(text);
          markdownCache.set(episode.id, html);
          return html;
        } catch (error) {
          const fallback = `<p>${escapeHtml(config.errorTextMissing)}</p>`;
          markdownCache.set(episode.id, fallback);
          return fallback;
        }
      };

      const buildCard = (episode, index) => {
        const article = document.createElement("article");
        article.className = "episode-card";
        article.dataset.id = episode.id;

        const imageButton = document.createElement("button");
        imageButton.className = "image-button";
        imageButton.type = "button";
        imageButton.setAttribute("aria-label", `${config.backButtonText}: ${episode.title}`);

        const cover = document.createElement("div");
        cover.className = "cover";

        const image = document.createElement("img");
        image.src = episode.image;
        image.alt = `${episode.title} cover image`;
        image.loading = index === 0 ? "eager" : "lazy";
        image.decoding = "async";
        if (index === 0) image.fetchPriority = "high";
        image.onerror = () => {
          cover.classList.add("has-error");
          if (!cover.querySelector(".image-fallback")) {
            cover.insertAdjacentHTML("afterbegin", `<div class="image-fallback">${escapeHtml(config.errorImageMissing)}</div>`);
          }
        };

        const title = document.createElement("div");
        title.className = "title-overlay";
        title.innerHTML = `<h2>${escapeHtml(episode.title)}</h2>${episode.date ? `<time datetime="${escapeHtml(episode.date)}">${escapeHtml(episode.date)}</time>` : ""}`;

        const quick = document.createElement("button");
        quick.className = "quick-view";
        quick.type = "button";
        quick.setAttribute("aria-label", `${config.quickViewTooltip}: ${episode.title}`);
        quick.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="10" cy="10" r="4"/><path d="m14 14 6 6"/><path d="M4 18c4-3 8-3 12 0"/><path d="M6 21c3-2 6-2 9 0"/></svg>';

        cover.append(image, title);
        imageButton.append(cover);
        article.append(imageButton, quick);

        imageButton.addEventListener("click", () => openEpisode(episode, article));
        imageButton.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            openEpisode(episode, article);
          }
        });
        quick.addEventListener("click", (event) => {
          event.stopPropagation();
          openQuickView(episode);
        });

        return article;
      };

      const loadConfig = async () => {
        try {
          const response = await fetch("config.json", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          config = { ...DEFAULT_CONFIG, ...(await response.json()) };
        } catch (error) {
          config = DEFAULT_CONFIG;
        }
        applyTheme();
        applyCopy();
        applyAssets();
      };

      const loadEpisodes = async () => {
        try {
          const response = await fetch("episodes.json", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          episodes = await response.json();
          grid.replaceChildren(...episodes.map(buildCard));
          skeleton.classList.add("fading");
          skeleton.setAttribute("aria-busy", "false");
          setTimeout(() => skeleton.classList.add("hidden"), motionDuration("skeletonFade"));
          grid.classList.remove("hidden");
          requestAnimationFrame(() => {
            document.querySelectorAll(".episode-card").forEach((card, index) => {
              setTimeout(() => card.classList.add("ready"), reduceMotion.matches ? 0 : index * 70);
            });
          });
          scheduleIdle(() => episodes.forEach((episode) => fetchMarkdownHtml(episode)));
        } catch (error) {
          skeleton.classList.add("hidden");
          skeleton.setAttribute("aria-busy", "false");
          setStatus(config.errorEpisodesMissing);
        }
      };

      const showEpisodes = async () => {
        if (lightbox.classList.contains("active")) await closeQuickView(false);
        if (isExpanded) await closeEpisode(false);
        await switchView("episodes");
        document.querySelector("#top").scrollIntoView({ behavior: reduceMotion.matches ? "auto" : "smooth", block: "start" });
        episodesBtn.focus({ preventScroll: true });
      };

      const viewportRect = () => ({
        left: 0,
        top: 0,
        width: window.innerWidth,
        height: window.innerHeight
      });

      const setShellRect = (rect) => {
        flipShell.style.left = `${rect.left}px`;
        flipShell.style.top = `${rect.top}px`;
        flipShell.style.width = `${rect.width}px`;
        flipShell.style.height = `${rect.height}px`;
      };

      const transformBetween = (from, to) => {
        const scaleX = to.width / from.width;
        const scaleY = to.height / from.height;
        const translateX = to.left - from.left;
        const translateY = to.top - from.top;
        return `translate3d(${translateX}px, ${translateY}px, 0) scale(${scaleX}, ${scaleY})`;
      };

      const normalizeShellTo = (rect) => {
        const previousTransition = flipShell.style.transition;
        flipShell.style.transition = "none";
        setShellRect(rect);
        flipShell.style.transform = "translate3d(0, 0, 0) scale(1)";
        flipShell.offsetHeight;
        flipShell.style.transition = previousTransition;
      };

      async function openEpisode(episode, sourceCard) {
        if (isExpanded || isClosing) return;
        isExpanded = true;
        activeSourceCard = sourceCard;
        clearTimeout(closeAudioTimer);

        const sourceRect = sourceCard.getBoundingClientRect();
        const targetRect = viewportRect();
        const htmlPromise = fetchMarkdownHtml(episode);
        const timingPromise = fetchEpisodeTiming(episode);

        frontFace.replaceChildren();
        const frontImage = document.createElement("img");
        frontImage.src = episode.image;
        frontImage.alt = `${episode.title} cover image`;
        frontImage.decoding = "async";
        frontFace.append(frontImage);
        expandedTitle.textContent = episode.title;
        expandedDate.textContent = episode.date || "";
        expandedDate.dateTime = episode.date || "";
        markdownBody.innerHTML = `<p>${escapeHtml(config.loadingText)}</p>`;
        markdownBody.dataset.highlighting = "false";
        pendingEstimatedHighlight = false;
        activeWord = null;
        audio.src = episode.audio;
        audio.volume = Number(volume.value);
        updateTime();
        setPlayState();
        setMuteState();

        setShellRect(sourceRect);
        flipShell.style.transform = "translate3d(0, 0, 0) scale(1)";
        flipCard.classList.remove("flipped");
        flipLayer.classList.add("active");
        flipLayer.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-lock");
        setBackgroundInert(true);
        sourceCard.style.visibility = "hidden";
        flipCard.focus({ preventScroll: true });

        await wait(motionDuration("startDelay"));
        flipLayer.classList.add("shaded");
        flipShell.style.transform = transformBetween(sourceRect, targetRect);
        await wait(motionDuration("expand"));
        normalizeShellTo(targetRect);
        flipCard.classList.add("flipped");
        markdownBody.innerHTML = await htmlPromise;
        const timing = await timingPromise;
        if (timing.length) {
          enableTextHighlighting(timing);
        } else {
          enableEstimatedHighlighting();
        }
        await wait(motionDuration("flip"));
        backBtn.focus();
      }

      async function closeEpisode(restoreFocus = true) {
        if (!isExpanded || isClosing || !activeSourceCard) return;
        isClosing = true;
        clearTimeout(closeAudioTimer);
        audio.pause();
        audio.currentTime = 0;
        setPlayState();
        stopAvatar(audio);
        if (activeWord) activeWord.classList.remove("active");
        activeWord = null;
        markdownBody.dataset.highlighting = "false";
        pendingEstimatedHighlight = false;

        const sourceRect = activeSourceCard.getBoundingClientRect();
        const targetRect = viewportRect();
        flipCard.classList.remove("flipped");
        await wait(motionDuration("flip"));
        normalizeShellTo(targetRect);
        flipShell.style.transform = transformBetween(targetRect, sourceRect);
        flipLayer.classList.remove("shaded");
        await wait(motionDuration("expand"));

        activeSourceCard.style.visibility = "";
        if (restoreFocus) {
          activeSourceCard.querySelector(".image-button").focus({ preventScroll: true });
          activeSourceCard.scrollIntoView({ behavior: reduceMotion.matches ? "auto" : "smooth", block: "center" });
        }
        flipLayer.classList.remove("active");
        flipLayer.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-lock");
        setBackgroundInert(false);
        frontFace.replaceChildren();
        audio.removeAttribute("src");
        audio.load();
        activeSourceCard = null;
        isExpanded = false;
        isClosing = false;
      }

      function openQuickView(episode) {
        closeQuickView(false);
        previousFocus = document.activeElement;
        lightboxImage.src = episode.image;
        lightboxImage.alt = `${episode.title} cover image`;
        lightbox.classList.add("active");
        lightbox.setAttribute("aria-hidden", "false");
        lightbox.setAttribute("aria-label", `${config.quickViewTooltip}: ${episode.title}`);
        document.body.classList.add("modal-lock");
        setBackgroundInert(true);
        requestAnimationFrame(() => lightbox.classList.add("visible"));
        lightbox.focus({ preventScroll: true });
        quickTimer = setTimeout(() => closeQuickView(), TIMING.quickView);
      }

      async function closeQuickView(animate = true) {
        clearTimeout(quickTimer);
        if (!lightbox.classList.contains("active")) return;
        lightbox.classList.remove("visible");
        if (animate) await wait(motionDuration("fade"));
        lightbox.classList.remove("active");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImage.removeAttribute("src");
        document.body.classList.remove("modal-lock");
        setBackgroundInert(false);
        if (previousFocus && typeof previousFocus.focus === "function") {
          previousFocus.focus({ preventScroll: true });
        }
        previousFocus = null;
      }

      playBtn.addEventListener("click", async () => {
        if (!audio.src) return;
        if (audio.paused) {
          try {
            await audio.play();
            await startAvatar(audio);
          } catch (error) {
            setStatus(config.audioError);
          }
        } else {
          audio.pause();
        }
        setPlayState();
      });
      muteBtn.addEventListener("click", () => {
        audio.muted = !audio.muted;
        setMuteState();
        if (audio.muted) {
          stopAvatar(audio);
        } else if (!audio.paused) {
          startAvatar(audio);
        }
      });

      backBtn.addEventListener("click", async () => {
        await closeEpisode();
      });
      readerHomeBtn.addEventListener("click", goHome);
      homeBtn.addEventListener("click", goHome);
      episodesBtn.addEventListener("click", showEpisodes);
      homeEpisodesBtn.addEventListener("click", showEpisodes);
      audio.addEventListener("play", () => {
        setPlayState();
        startAvatar(audio);
      });
      audio.addEventListener("pause", () => {
        setPlayState();
        stopAvatar(audio);
      });
      audio.addEventListener("volumechange", () => {
        setMuteState();
        if (audio.muted) {
          stopAvatar(audio);
        } else if (!audio.paused) {
          startAvatar(audio);
        }
      });
      audio.addEventListener("loadedmetadata", () => {
        updateTime();
        if (pendingEstimatedHighlight) enableEstimatedHighlighting();
      });
      audio.addEventListener("timeupdate", () => {
        updateTime();
        requestTextHighlight();
      });
      audio.addEventListener("error", () => {
        timeDisplay.textContent = config.audioUnavailable;
      });
      audio.addEventListener("ended", () => {
        stopAvatar(audio);
        closeAudioTimer = setTimeout(() => {
          if (isExpanded) closeEpisode();
        }, TIMING.autoReturnDelay);
      });

      progress.addEventListener("input", () => {
        if (!audio.duration) return;
        audio.currentTime = (Number(progress.value) / 100) * audio.duration;
        requestTextHighlight();
      });

      volume.addEventListener("input", () => {
        audio.volume = Number(volume.value);
      });

      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) closeQuickView();
      });
      lightbox.addEventListener("touchstart", (event) => {
        quickTouchY = event.changedTouches[0].clientY;
      }, { passive: true });
      lightbox.addEventListener("touchend", (event) => {
        if (quickTouchY !== null && event.changedTouches[0].clientY - quickTouchY > SWIPE_DISMISS_DISTANCE) {
          closeQuickView();
        }
        quickTouchY = null;
      }, { passive: true });

      flipLayer.addEventListener("touchstart", (event) => {
        flipTouchY = event.changedTouches[0].clientY;
      }, { passive: true });
      flipLayer.addEventListener("touchend", (event) => {
        if (flipTouchY !== null && event.changedTouches[0].clientY - flipTouchY > SWIPE_DISMISS_DISTANCE) {
          closeEpisode();
        }
        flipTouchY = null;
      }, { passive: true });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (lightbox.classList.contains("active")) {
            closeQuickView();
            return;
          }
          if (isExpanded) closeEpisode();
        }

        if (event.code === "Space" && isExpanded) {
          event.preventDefault();
          playBtn.click();
        }

        if (event.key === "Tab" && isExpanded) {
          const focusable = flipCard.querySelectorAll("button, input, a");
          const items = Array.from(focusable).filter((item) => !item.disabled);
          if (!items.length) return;
          const first = items[0];
          const last = items[items.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      const syncExpandedPosition = () => {
        resizeFrame = null;
        if (!isExpanded || !activeSourceCard) return;
        normalizeShellTo(viewportRect());
      };

      window.addEventListener("resize", () => {
        if (resizeFrame !== null) return;
        resizeFrame = requestAnimationFrame(syncExpandedPosition);
      });

      const init = async () => {
        await loadConfig();
        renderAvatar();
        animateAvatar();
        scheduleBlink();
        await loadEpisodes();
      };

      init();
    </script>
  </body>
</html>
