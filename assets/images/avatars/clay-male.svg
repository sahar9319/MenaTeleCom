<svg class="avatar-head-svg" viewBox="0 0 140 168" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="clayMaleShadow" x="-24%" y="-24%" width="148%" height="148%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#7f95aa" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="-4" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.62"/>
    </filter>
    <radialGradient id="clayMaleFace" cx="36%" cy="24%" r="78%">
      <stop offset="0" stop-color="#fffaf3"/>
      <stop offset="0.38" stop-color="var(--avatar-skin-color)"/>
      <stop offset="1" stop-color="color-mix(in srgb, var(--avatar-skin-color) 68%, #c9956c)"/>
    </radialGradient>
    <linearGradient id="clayMaleHair" x1="24" y1="10" x2="116" y2="58">
      <stop stop-color="#263445"/>
      <stop offset="0.55" stop-color="#3f5368"/>
      <stop offset="1" stop-color="#556b82"/>
    </linearGradient>
    <linearGradient id="clayMaleHeadset" x1="20" y1="18" x2="120" y2="112">
      <stop stop-color="color-mix(in srgb, var(--primary) 48%, white)"/>
