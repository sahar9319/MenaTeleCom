<svg class="avatar-head-svg" viewBox="0 0 140 168" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="clayFemaleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#c4a8b0" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.58"/>
    </filter>
    <radialGradient id="clayFemaleFace" cx="38%" cy="26%" r="74%">
      <stop offset="0" stop-color="#fff8f2"/>
      <stop offset="0.4" stop-color="#f8dcc8"/>
      <stop offset="1" stop-color="color-mix(in srgb, var(--avatar-skin-color) 70%, #e8a888)"/>
    </radialGradient>
    <linearGradient id="clayFemaleHair" x1="8" y1="0" x2="132" y2="72">
      <stop stop-color="#5c3848"/>
      <stop offset="0.45" stop-color="#8b5a68"/>
      <stop offset="1" stop-color="#6d4458"/>
    </linearGradient>
    <linearGradient id="clayFemaleHeadset" x1="24" y1="20" x2="116" y2="108">
      <stop stop-color="color-mix(in srgb, var(--accent) 50%, white)"/>
      <stop offset="1" stop-color="color-mix(in srgb, var(--primary) 70%, var(--accent))"/>
    </linearGradient>
    <linearGradient id="clayFemaleBase" x1="20" y1="148" x2="120" y2="168">
      <stop stop-color="color-mix(in srgb, var(--surface) 92%, var(--accent))"/>
      <stop offset="1" stop-color="color-mix(in srgb, var(--clay-dark) 62%, var(--accent))"/>
    </linearGradient>
    <radialGradient id="clayFemaleCheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="color-mix(in srgb, var(--accent) 42%, transparent)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="clayFemaleCheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="color-mix(in srgb, var(--accent) 38%, transparent)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="clayFemaleIrisL" cx="40%" cy="38%" r="65%">
      <stop offset="0" stop-color="#d48898"/>
      <stop offset="1" stop-color="#7a4058"/>
    </radialGradient>
    <radialGradient id="clayFemaleIrisR" cx="40%" cy="38%" r="65%">
      <stop offset="0" stop-color="#d48898"/>
      <stop offset="1" stop-color="#7a4058"/>
    </radialGradient>
  </defs>
  <ellipse class="avatar-base" cx="70" cy="160" rx="44" ry="8" fill="url(#clayFemaleBase)" opacity="0.9"/>
  <g filter="url(#clayFemaleShadow)">
    <!-- soft flowing hair -->
    <path d="M8 58c6-38 112-38 124 0 6 18 2 32-12 44-18 14-52 14-70 0-14-12-18-26-12-44z" fill="url(#clayFemaleHair)"/>
    <path d="M16 62c10-22 98-22 108 0 5 10 2 18-8 26-14 10-78 10-92 0-10-8-13-16-8-26z" fill="#fff" opacity="0.08"/>
    <!-- bangs -->
    <path d="M34 48c8-16 64-16 72 0 3 8-2 16-12 20-10 6-52 6-62 0-10-4-14-12-10-20z" fill="url(#clayFemaleHair)"/>
    <path d="M38 52c4-8 64-8 64 0 2 6-2 10-8 12-8 4-52 4-60 0-6-2-8-6-6-12z" fill="#fff" opacity="0.06"/>
    <!-- round face -->
    <circle cx="70" cy="94" r="38" fill="url(#clayFemaleFace)"/>
    <ellipse cx="70" cy="90" rx="30" ry="26" fill="#ffffff" opacity="0.2"/>
    <!-- blush -->
    <ellipse cx="49" cy="102" rx="13" ry="9" fill="url(#clayFemaleCheekL)" opacity="0.9"/>
    <ellipse cx="91" cy="102" rx="13" ry="9" fill="url(#clayFemaleCheekR)" opacity="0.9"/>
    <!-- tiny nose -->
    <ellipse cx="70" cy="98" rx="2.8" ry="2.2" fill="color-mix(in srgb, var(--accent) 22%, #e8b0a0)" opacity="0.5"/>
    <!-- big sparkly eyes -->
    <ellipse class="avatar-eye avatar-eye-left" cx="55" cy="86" rx="13" ry="12" fill="#fffefb"/>
    <ellipse class="avatar-eye avatar-eye-right" cx="85" cy="86" rx="13" ry="12" fill="#fffefb"/>
    <circle cx="56" cy="87" r="6.5" fill="url(#clayFemaleIrisL)"/>
    <circle cx="84" cy="87" r="6.5" fill="url(#clayFemaleIrisR)"/>
    <circle class="avatar-pupil" cx="56" cy="87" r="3.2" fill="#4a2838"/>
    <circle class="avatar-pupil" cx="84" cy="87" r="3.2" fill="#4a2838"/>
    <circle cx="59.5" cy="83" r="2.6" fill="#fff" opacity="0.96"/>
    <circle cx="87.5" cy="83" r="2.6" fill="#fff" opacity="0.96"/>
    <circle cx="54" cy="89" r="1.1" fill="#fff" opacity="0.75"/>
    <circle cx="82" cy="89" r="1.1" fill="#fff" opacity="0.75"/>
    <!-- soft brows -->
    <path class="avatar-brow avatar-brow-left" d="M43 76c8-7 14-8 20-3" stroke="#8a5868" stroke-width="2.4" stroke-linecap="round"/>
    <path class="avatar-brow avatar-brow-right" d="M77 76c8-7 14-8 20-3" stroke="#8a5868" stroke-width="2.4" stroke-linecap="round"/>
    <!-- cute lips -->
    <ellipse class="avatar-mouth" cx="70" cy="110" rx="8.5" ry="4" fill="color-mix(in srgb, var(--accent) 62%, #d07078)"/>
    <path d="M62 109c4 3.5 12 3.5 16 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <!-- soft headset -->
    <path d="M34 88c0-32 16-50 36-50s36 18 36 50" stroke="url(#clayFemaleHeadset)" stroke-width="7" stroke-linecap="round"/>
    <rect x="24" y="82" width="15" height="24" rx="7.5" fill="url(#clayFemaleHeadset)"/>
    <rect x="101" y="82" width="15" height="24" rx="7.5" fill="url(#clayFemaleHeadset)"/>
    <rect x="27" y="86" width="9" height="14" rx="4.5" fill="#fff" opacity="0.18"/>
    <rect x="104" y="86" width="9" height="14" rx="4.5" fill="#fff" opacity="0.18"/>
    <path d="M106 106c0 12-11 20-24 20" stroke="url(#clayFemaleHeadset)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="90" cy="124" r="4.5" fill="var(--accent)"/>
    <circle cx="90" cy="124" r="2" fill="#fff" opacity="0.5"/>
  </g>
</svg>
